name: PR Webhook Fixtures

on:
  pull_request:
    paths:
      - 'openapi.yaml'
      - 'tests/fixtures/**'
      - 'tests/validate-fixtures.mjs'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  webhook-fixtures:
    name: Validate webhook fixtures
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Validate fixtures
        run: node tests/validate-fixtures.mjs
