name: PR checks

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changed inputs
    runs-on: ubuntu-latest
    outputs:
      openapi_contract: ${{ steps.filter.outputs.openapi_contract }}
      webhook_fixtures: ${{ steps.filter.outputs.webhook_fixtures }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect relevant file changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            openapi_contract:
              - 'openapi.yaml'
            webhook_fixtures:
              - 'openapi.yaml'
              - 'tests/fixtures/**'
              - 'tests/validate-fixtures.mjs'

  prettier:
    name: Check formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Check formatting
        run: npx --yes prettier --check .

  openapi-contract:
    name: Validate OpenAPI contract
    needs: changes
    if: needs.changes.outputs.openapi_contract == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Lint OpenAPI contract
        run: npx --yes @redocly/cli lint openapi.yaml

  webhook-fixtures:
    name: Validate webhook fixtures
    needs: changes
    if: needs.changes.outputs.webhook_fixtures == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Validate fixtures
        run: node tests/validate-fixtures.mjs
