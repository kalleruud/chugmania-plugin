openapi: 3.1.0
info:
  title: Chugmania Webhook Contract
  version: 1.0.0
  description: >-
    Contract for race attempt and Turbo arcade name-input events emitted by
    the Chugmania Webhooks Openplanet plugin.
webhooks:
  raceAttemptEnded:
    post:
      summary: A race attempt ended
      description: >-
        Sent once when a captured solo or split-screen race attempt ends.
        Receivers should use eventId as an idempotency key because delivery may
        be retried.
      operationId: receiveRaceAttemptEnded
      security:
        - ApiKey: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RaceAttemptEndedEvent'
      responses:
        '204':
          description: Event consumed by the receiver
        '503':
          description: Event not consumed because no session was available
        '400':
          description: Invalid event payload
        '401':
          description: Missing or invalid API key
        '500':
          description: Receiver failed to process the event
  turboArcadeNameInput:
    post:
      summary: A Turbo arcade name was input
      description: >-
        Sent whenever a Turbo arcade player changes their registered name
        during a captured attempt. Receivers should use eventId as an
        idempotency key because delivery may be retried.
      operationId: receiveTurboArcadeNameInput
      security:
        - ApiKey: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TurboArcadeNameInputEvent'
      responses:
        '204':
          description: Event consumed by the receiver
        '503':
          description: Event not consumed because no session was available
        '400':
          description: Invalid event payload
        '401':
          description: Missing or invalid API key
        '500':
          description: Receiver failed to process the event
components:
  securitySchemes:
    ApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: Optional; sent only when an API key is configured in the plugin.
  schemas:
    RaceAttemptEndedEvent:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - eventType
        - eventId
        - occurredAtUtc
        - source
        - attempt
      properties:
        schemaVersion:
          description: Version of the webhook payload schema used to encode this event.
          type: string
          const: '1.0'
        eventType:
          description: Stable identifier for the kind of event represented by the payload.
          type: string
          const: race.attempt.ended
        eventId:
          description: Unique attempt identifier that receivers can use as an idempotency key.
          type: string
          minLength: 1
        occurredAtUtc:
          description: UTC timestamp when the captured race attempt ended.
          type: string
          format: date-time
        source:
          description: Plugin and game that emitted the event.
          allOf:
            - $ref: '#/components/schemas/EventSource'
        attempt:
          description: Complete captured state and event history for the race attempt.
          allOf:
            - $ref: '#/components/schemas/RaceAttempt'
    TurboArcadeNameInputEvent:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - eventType
        - eventId
        - occurredAtUtc
        - source
        - attemptId
        - nameInput
        - playerIndex
        - terminalIndex
        - durationMs
      properties:
        schemaVersion:
          description: Version of the webhook payload schema used to encode this event.
          type: string
          const: '1.0'
        eventType:
          description: Stable identifier for the kind of event represented by the payload.
          type: string
          const: turbo.arcade.name.input
        eventId:
          description: Unique event identifier that receivers can use as an idempotency key.
          type: string
          minLength: 1
        occurredAtUtc:
          description: UTC timestamp when the name input was observed.
          type: string
          format: date-time
        source:
          description: Plugin and game that emitted the event.
          allOf:
            - $ref: '#/components/schemas/EventSource'
        attemptId:
          description: Attempt identifier that the name input belongs to.
          type: string
          minLength: 1
        nameInput:
          description: Player name entered or changed in Turbo arcade mode.
          type: string
          minLength: 1
        playerIndex:
          description: Zero-based index of the player in the playground player list when the name input was observed.
          type: integer
          minimum: 0
        terminalIndex:
          description: Zero-based split-screen terminal controlling the player, or -1 when no controlling terminal was found.
          type: integer
          minimum: -1
        durationMs:
          description: Elapsed milliseconds from the attempt start when the name input was observed.
          type: integer
          minimum: 0
    EventSource:
      type: object
      additionalProperties: false
      required: [pluginName, pluginVersion, game]
      properties:
        pluginName:
          description: Name of the Openplanet plugin that emitted the event.
          type: string
          const: Chugmania Webhooks
        pluginVersion:
          description: Installed version of the Openplanet plugin that emitted the event.
          type: string
          minLength: 1
        game:
          description: Game from which the race attempt was captured.
          type: string
          enum: [Trackmania, Trackmania Turbo]
    RaceAttempt:
      type: object
      additionalProperties: false
      required:
        - attemptId
        - format
        - playerCount
        - startedAtUtc
        - endedAtUtc
        - durationMs
        - endReason
        - timingSource
        - mode
        - map
        - players
      properties:
        attemptId:
          description: Unique identifier generated for this captured race attempt.
          type: string
          minLength: 1
        format:
          description: Whether the attempt involved one player or multiple local split-screen players.
          type: string
          enum: [solo, split_screen]
        playerCount:
          description: Number of players included in the attempt payload.
          type: integer
          minimum: 1
        startedAtUtc:
          description: UTC timestamp of the earliest captured player start in the attempt.
          type: string
          format: date-time
        endedAtUtc:
          description: UTC timestamp of the final captured player event in the attempt.
          type: string
          format: date-time
        durationMs:
          description: Duration in milliseconds of the final captured player event in the attempt.
          type: integer
          minimum: 0
        endReason:
          description: Condition that caused the plugin to close and emit the attempt.
          type: string
          enum: [all_finished, round_ended, restart, playground_closed, map_changed]
        timingSource:
          description: Clock source used for race durations and checkpoint times.
          type: string
          enum: [mlfeed_game_clock, turbo_native_race_clock]
        mode:
          description: Game mode state captured during the attempt.
          allOf:
            - $ref: '#/components/schemas/GameMode'
        map:
          description: Map metadata and race configuration for the attempt.
          allOf:
            - $ref: '#/components/schemas/Map'
        players:
          description: Players captured in the attempt, each with an ordered event history.
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Player'
    GameMode:
      type: object
      additionalProperties: false
      required: [name, warmupActive, startTime, endTime, timeLimitMs, settings]
      properties:
        name:
          description: >-
            Server mode name in Trackmania, or one of campaign, arcade,
            hot_seat, and split_screen when captured in Turbo.
          type: [string, 'null']
        warmupActive:
          description: Whether the game mode was in its warmup phase when captured.
          type: boolean
        startTime:
          description: Mode start time on the game clock in milliseconds, or null when unavailable.
          allOf:
            - $ref: '#/components/schemas/NullableNonNegativeInteger'
        endTime:
          description: Mode end time on the game clock in milliseconds, or null when unavailable.
          allOf:
            - $ref: '#/components/schemas/NullableNonNegativeInteger'
        timeLimitMs:
          description: Difference between mode end and start times in milliseconds, or null when no positive limit is exposed.
          allOf:
            - $ref: '#/components/schemas/NullableNonNegativeInteger'
        settings:
          description: Generic behavior and scoring settings exposed by the mode rules.
          allOf:
            - $ref: '#/components/schemas/ModeSettings'
    ModeSettings:
      type: object
      additionalProperties: false
      required:
        - lapCountOverride
        - pointsLimit
        - spawnDelayDurationMs
        - respawnBehavior
        - checkpointBehavior
        - giveUpBehavior
        - giveUpRespawnAfter
        - giveUpSkipAfterFinish
        - usesTeams
      properties:
        lapCountOverride:
          description: Mode-level lap count override, or null when none is exposed.
          allOf:
            - $ref: '#/components/schemas/NullableNonNegativeInteger'
        pointsLimit:
          description: Points required by the mode's score limit, or null when unavailable.
          allOf:
            - $ref: '#/components/schemas/NullableNonNegativeInteger'
        spawnDelayDurationMs:
          description: Delay in milliseconds imposed by the mode before a player can spawn, or null when unavailable.
          allOf:
            - $ref: '#/components/schemas/NullableNonNegativeInteger'
        respawnBehavior:
          description: Mode rule that determines what happens when a player requests a respawn, or null when unavailable in Turbo.
          type: [string, 'null']
          enum: [do_nothing, give_up_before_first_checkpoint, always_give_up, always_respawn, custom, null]
        checkpointBehavior:
          description: Mode rule that determines how checkpoint progression is handled, or null when unavailable in Turbo.
          type: [string, 'null']
          enum: [default, infinite_laps, custom, null]
        giveUpBehavior:
          description: Mode rule that determines what happens when a player gives up, or null when unavailable in Turbo.
          type: [string, 'null']
          enum: [do_nothing, give_up, custom, null]
        giveUpRespawnAfter:
          description: Whether the mode respawns a player after processing a give-up request, or null when unavailable in Turbo.
          type: [boolean, 'null']
        giveUpSkipAfterFinish:
          description: Whether the mode ignores give-up requests after the player crosses the finish line, or null when unavailable in Turbo.
          type: [boolean, 'null']
        usesTeams:
          description: Whether the mode enables clans, multiple clans, or forced clans, or null when unavailable in Turbo.
          type: [boolean, 'null']
    Map:
      type: object
      additionalProperties: false
      required:
        - uid
        - name
        - authorLogin
        - authorName
        - mapType
        - mapStyle
        - environment
        - laps
        - isLapRace
        - checkpointsPerLap
        - waypointsToFinish
        - mlFeedLapCount
        - medalTimesMs
      properties:
        uid:
          description: Stable unique identifier assigned to the Trackmania map.
          type: string
        name:
          description: Display name of the map with Trackmania formatting codes removed.
          type: string
        authorLogin:
          description: Trackmania login of the map author.
          type: string
        authorName:
          description: Display name of the map author with Trackmania formatting codes removed.
          type: string
        mapType:
          description: Map type reported by Trackmania, with formatting codes removed.
          type: string
        mapStyle:
          description: Map style reported by Trackmania, with formatting codes removed.
          type: string
        environment:
          description: Map environment or vehicle family, such as Canyon, Valley, Lagoon, or Stadium.
          type: string
        laps:
          description: Accurate lap count reported by MLFeed in Trackmania or by the map objective in Turbo, or null when unavailable.
          allOf:
            - $ref: '#/components/schemas/NullableNonNegativeInteger'
        isLapRace:
          description: Whether the map objective is configured as a lap race.
          type: boolean
        checkpointsPerLap:
          description: Number of checkpoints in one lap reported by MLFeed, or null when unavailable.
          allOf:
            - $ref: '#/components/schemas/NullableNonNegativeInteger'
        waypointsToFinish:
          description: Total number of checkpoint or finish waypoints required to complete the race, or null when unavailable.
          allOf:
            - $ref: '#/components/schemas/NullableNonNegativeInteger'
        mlFeedLapCount:
          description: Accurate lap count supplied directly by MLFeed, or null in Turbo and when unavailable.
          allOf:
            - $ref: '#/components/schemas/NullableNonNegativeInteger'
        medalTimesMs:
          description: Map medal target times measured in milliseconds.
          allOf:
            - $ref: '#/components/schemas/MedalTimes'
    MedalTimes:
      type: object
      additionalProperties: false
      required: [author, gold, silver, bronze]
      properties:
        author:
          description: Author medal target time in milliseconds.
          type: integer
          minimum: 0
        gold:
          description: Gold medal target time in milliseconds.
          type: integer
          minimum: 0
        silver:
          description: Silver medal target time in milliseconds.
          type: integer
          minimum: 0
        bronze:
          description: Bronze medal target time in milliseconds.
          type: integer
          minimum: 0
    Player:
      type: object
      additionalProperties: false
      required:
        - participantKey
        - playerIndex
        - terminalIndex
        - login
        - accountId
        - name
        - finishPosition
        - events
      properties:
        participantKey:
          description: Best available stable player key, chosen from account ID, login, or a local fallback identifier.
          type: string
          minLength: 1
        playerIndex:
          description: Zero-based index of the player in the playground player list when capture began.
          type: integer
          minimum: 0
        terminalIndex:
          description: Zero-based split-screen terminal controlling the player, or -1 when no controlling terminal was found.
          type: integer
          minimum: -1
        login:
          description: Trackmania login associated with the player, or an empty string when unavailable.
          type: string
        accountId:
          description: Web services account identifier for the player, or null when unavailable.
          type: [string, 'null']
        name:
          description: Player display name with Trackmania formatting codes removed.
          type: string
        finishPosition:
          description: One-based finishing position among captured finishers, or null when the player did not finish.
          allOf:
            - $ref: '#/components/schemas/NullableNonNegativeInteger'
        events:
          description: Chronologically ordered race events captured for the player.
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/RaceEvent'
    RaceEvent:
      description: A timestamped milestone or terminal action in a player's race.
      oneOf:
        - $ref: '#/components/schemas/BasicRaceEvent'
        - $ref: '#/components/schemas/LapRaceEvent'
        - $ref: '#/components/schemas/CheckpointRaceEvent'
        - $ref: '#/components/schemas/RespawnRaceEvent'
      discriminator:
        propertyName: type
        mapping:
          start: '#/components/schemas/LapRaceEvent'
          lap: '#/components/schemas/LapRaceEvent'
          first_throttle: '#/components/schemas/BasicRaceEvent'
          quit: '#/components/schemas/BasicRaceEvent'
          restart: '#/components/schemas/BasicRaceEvent'
          dnf: '#/components/schemas/BasicRaceEvent'
          checkpoint: '#/components/schemas/CheckpointRaceEvent'
          finish: '#/components/schemas/CheckpointRaceEvent'
          respawn: '#/components/schemas/RespawnRaceEvent'
    BasicRaceEvent:
      type: object
      additionalProperties: false
      required: [type, atUtc, durationMs]
      properties:
        type:
          description: Kind of non-checkpoint event recorded for the player.
          type: string
          enum: [first_throttle, quit, restart, dnf]
        atUtc:
          description: UTC timestamp when the event occurred.
          type: string
          format: date-time
        durationMs:
          description: Player race time in milliseconds at which the event occurred.
          type: integer
          minimum: 0
    LapRaceEvent:
      type: object
      additionalProperties: false
      required: [type, atUtc, durationMs, lapNumber]
      properties:
        type:
          description: Whether this event starts the race or a subsequent lap.
          type: string
          enum: [start, lap]
        atUtc:
          description: UTC timestamp when the lap started.
          type: string
          format: date-time
        durationMs:
          description: Player race time in milliseconds when the lap started.
          type: integer
          minimum: 0
        lapNumber:
          description: One-based number of the lap that started with this event.
          type: integer
          minimum: 1
    CheckpointRaceEvent:
      type: object
      additionalProperties: false
      required: [type, atUtc, durationMs, checkpoint, theoreticalDurationMs]
      properties:
        type:
          description: Whether the player reached an intermediate checkpoint or the finish.
          type: string
          enum: [checkpoint, finish]
        atUtc:
          description: UTC timestamp when the checkpoint or finish was reached.
          type: string
          format: date-time
        durationMs:
          description: Player race time in milliseconds when the checkpoint or finish was reached, including respawn losses.
          type: integer
          minimum: 0
        checkpoint:
          description: Checkpoint sequence position reached by this event.
          allOf:
            - $ref: '#/components/schemas/CheckpointReference'
        theoreticalDurationMs:
          description: Race time in milliseconds with cumulative respawn losses removed, or null when loss data is unavailable.
          allOf:
            - $ref: '#/components/schemas/NullableNonNegativeInteger'
    RespawnRaceEvent:
      type: object
      additionalProperties: false
      required: [type, atUtc, durationMs, respawn]
      properties:
        type:
          description: Identifies the event as a player respawn request.
          type: string
          const: respawn
        atUtc:
          description: UTC timestamp when the respawn occurred.
          type: string
          format: date-time
        durationMs:
          description: Player race time in milliseconds at which the respawn occurred.
          type: integer
          minimum: 0
        respawn:
          description: Checkpoint context associated with the respawn.
          allOf:
            - $ref: '#/components/schemas/RespawnReference'
    CheckpointReference:
      type: object
      additionalProperties: false
      required: [index, lapIndex]
      properties:
        index:
          description: One-based checkpoint sequence index across the whole race; lap lines are excluded.
          type: integer
          minimum: 1
        lapIndex:
          description: One-based checkpoint sequence index within the current lap.
          type: integer
          minimum: 1
    RespawnReference:
      type: object
      additionalProperties: false
      required: [checkpointIndex]
      properties:
        checkpointIndex:
          description: Checkpoint sequence index from which the player respawned, or null when unavailable for an older respawn.
          allOf:
            - $ref: '#/components/schemas/NullableNonNegativeInteger'
    NullableNonNegativeInteger:
      description: A non-negative integer value, or null when the source does not provide it.
      type: [integer, 'null']
      minimum: 0
