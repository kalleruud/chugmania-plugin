openapi: 3.1.0
info:
  title: Chugmania Webhook Contract
  version: 1.1.0
  description: >-
    Contract for race attempt events emitted by the Chugmania Webhooks
    Openplanet plugin.
webhooks:
  raceAttemptEnded:
    post:
      summary: A race attempt ended
      description: >-
        Sent once when a captured solo or split-screen race attempt ends.
        Receivers should use eventId as an idempotency key because delivery may
        be retried.
      operationId: receiveRaceAttemptEnded
      security:
        - ApiKey: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RaceAttemptEndedEvent'
      responses:
        '204':
          description: Event accepted
        '400':
          description: Invalid event payload
        '401':
          description: Missing or invalid API key
        '500':
          description: Receiver failed to process the event
components:
  securitySchemes:
    ApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: Optional; sent only when an API key is configured in the plugin.
  schemas:
    RaceAttemptEndedEvent:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - eventType
        - eventId
        - occurredAtUtc
        - source
        - attempt
      properties:
        schemaVersion:
          type: string
          const: '1.1'
        eventType:
          type: string
          const: race.attempt.ended
        eventId:
          type: string
          minLength: 1
        occurredAtUtc:
          type: string
          format: date-time
        source:
          $ref: '#/components/schemas/EventSource'
        attempt:
          $ref: '#/components/schemas/RaceAttempt'
    EventSource:
      type: object
      additionalProperties: false
      required: [pluginName, pluginVersion, game]
      properties:
        pluginName:
          type: string
          const: Chugmania Webhooks
        pluginVersion:
          type: string
          minLength: 1
        game:
          type: string
          const: Trackmania
    RaceAttempt:
      type: object
      additionalProperties: false
      required:
        - attemptId
        - format
        - playerCount
        - startedAtUtc
        - endedAtUtc
        - durationMs
        - endReason
        - timingSource
        - mode
        - map
        - players
      properties:
        attemptId:
          type: string
          minLength: 1
        format:
          type: string
          enum: [solo, split_screen]
        playerCount:
          type: integer
          minimum: 1
        startedAtUtc:
          type: string
          format: date-time
        endedAtUtc:
          type: string
          format: date-time
        durationMs:
          type: integer
          minimum: 0
        endReason:
          type: string
          enum: [all_finished, round_ended, restart, playground_closed, map_changed]
        timingSource:
          type: string
          const: mlfeed_game_clock
        mode:
          $ref: '#/components/schemas/GameMode'
        map:
          $ref: '#/components/schemas/Map'
        players:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Player'
    GameMode:
      type: object
      additionalProperties: false
      required: [name, warmupActive, startTime, endTime, timeLimitMs, settings]
      properties:
        name:
          type: [string, 'null']
        warmupActive:
          type: boolean
        startTime:
          $ref: '#/components/schemas/NullableNonNegativeInteger'
        endTime:
          $ref: '#/components/schemas/NullableNonNegativeInteger'
        timeLimitMs:
          $ref: '#/components/schemas/NullableNonNegativeInteger'
        settings:
          $ref: '#/components/schemas/ModeSettings'
    ModeSettings:
      type: object
      additionalProperties: false
      required:
        - lapCountOverride
        - pointsLimit
        - spawnDelayDurationMs
        - respawnBehavior
        - checkpointBehavior
        - giveUpBehavior
        - giveUpRespawnAfter
        - giveUpSkipAfterFinish
        - usesTeams
      properties:
        lapCountOverride:
          $ref: '#/components/schemas/NullableNonNegativeInteger'
        pointsLimit:
          $ref: '#/components/schemas/NullableNonNegativeInteger'
        spawnDelayDurationMs:
          $ref: '#/components/schemas/NullableNonNegativeInteger'
        respawnBehavior:
          type: string
          enum: [do_nothing, give_up_before_first_checkpoint, always_give_up, always_respawn, custom]
        checkpointBehavior:
          type: string
          enum: [default, infinite_laps, custom]
        giveUpBehavior:
          type: string
          enum: [do_nothing, give_up, custom]
        giveUpRespawnAfter:
          type: boolean
        giveUpSkipAfterFinish:
          type: boolean
        usesTeams:
          type: boolean
    Map:
      type: object
      additionalProperties: false
      required:
        - uid
        - name
        - authorLogin
        - authorName
        - mapType
        - mapStyle
        - laps
        - isLapRace
        - checkpointsPerLap
        - waypointsToFinish
        - mlFeedLapCount
        - medalTimesMs
      properties:
        uid:
          type: string
        name:
          type: string
        authorLogin:
          type: string
        authorName:
          type: string
        mapType:
          type: string
        mapStyle:
          type: string
        laps:
          $ref: '#/components/schemas/NullableNonNegativeInteger'
        isLapRace:
          type: boolean
        checkpointsPerLap:
          $ref: '#/components/schemas/NullableNonNegativeInteger'
        waypointsToFinish:
          $ref: '#/components/schemas/NullableNonNegativeInteger'
        mlFeedLapCount:
          $ref: '#/components/schemas/NullableNonNegativeInteger'
        medalTimesMs:
          $ref: '#/components/schemas/MedalTimes'
    MedalTimes:
      type: object
      additionalProperties: false
      required: [author, gold, silver, bronze]
      properties:
        author:
          type: integer
          minimum: 0
        gold:
          type: integer
          minimum: 0
        silver:
          type: integer
          minimum: 0
        bronze:
          type: integer
          minimum: 0
    Player:
      type: object
      additionalProperties: false
      required:
        - participantKey
        - playerIndex
        - terminalIndex
        - login
        - accountId
        - name
        - isFake
        - isBot
        - isLocalPlayer
        - spawnIndex
        - finishPosition
        - theoreticalRaceTimeMs
        - ranks
        - timingDiagnostics
        - sessionBest
        - events
      properties:
        participantKey:
          type: string
          minLength: 1
        playerIndex:
          type: integer
          minimum: 0
        terminalIndex:
          type: integer
          minimum: -1
        login:
          type: string
        accountId:
          type: [string, 'null']
        name:
          type: string
        isFake:
          type: boolean
        isBot:
          type: boolean
        isLocalPlayer:
          type: boolean
        spawnIndex:
          type: integer
          minimum: -1
        finishPosition:
          $ref: '#/components/schemas/NullableNonNegativeInteger'
        theoreticalRaceTimeMs:
          $ref: '#/components/schemas/NullableNonNegativeInteger'
        ranks:
          $ref: '#/components/schemas/PlayerRanks'
        timingDiagnostics:
          $ref: '#/components/schemas/TimingDiagnostics'
        sessionBest:
          $ref: '#/components/schemas/SessionBest'
        events:
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/RaceEvent'
    PlayerRanks:
      type: object
      additionalProperties: false
      required: [race, raceWithRespawns, timeAttack]
      properties:
        race:
          $ref: '#/components/schemas/NullableNonNegativeInteger'
        raceWithRespawns:
          $ref: '#/components/schemas/NullableNonNegativeInteger'
        timeAttack:
          $ref: '#/components/schemas/NullableNonNegativeInteger'
    TimingDiagnostics:
      type: object
      additionalProperties: false
      required: [latencyEstimateMs, latencySampleCount]
      properties:
        latencyEstimateMs:
          type: [number, 'null']
        latencySampleCount:
          type: [number, 'null']
          minimum: 0
    SessionBest:
      type: object
      additionalProperties: false
      required: [raceCheckpointTimesMs, lapCheckpointTimesMs]
      properties:
        raceCheckpointTimesMs:
          $ref: '#/components/schemas/DurationArray'
        lapCheckpointTimesMs:
          $ref: '#/components/schemas/DurationArray'
    DurationArray:
      type: array
      items:
        type: integer
        minimum: 0
    RaceEvent:
      oneOf:
        - $ref: '#/components/schemas/BasicRaceEvent'
        - $ref: '#/components/schemas/CheckpointRaceEvent'
        - $ref: '#/components/schemas/RespawnRaceEvent'
      discriminator:
        propertyName: type
        mapping:
          start: '#/components/schemas/BasicRaceEvent'
          first_throttle: '#/components/schemas/BasicRaceEvent'
          quit: '#/components/schemas/BasicRaceEvent'
          restart: '#/components/schemas/BasicRaceEvent'
          dnf: '#/components/schemas/BasicRaceEvent'
          checkpoint: '#/components/schemas/CheckpointRaceEvent'
          finish: '#/components/schemas/CheckpointRaceEvent'
          respawn: '#/components/schemas/RespawnRaceEvent'
    BasicRaceEvent:
      type: object
      additionalProperties: false
      required: [type, atUtc, durationMs]
      properties:
        type:
          type: string
          enum: [start, first_throttle, quit, restart, dnf]
        atUtc:
          type: string
          format: date-time
        durationMs:
          type: integer
          minimum: 0
    CheckpointRaceEvent:
      type: object
      additionalProperties: false
      required: [type, atUtc, durationMs, checkpoint, theoreticalDurationMs]
      properties:
        type:
          type: string
          enum: [checkpoint, finish]
        atUtc:
          type: string
          format: date-time
        durationMs:
          type: integer
          minimum: 0
        checkpoint:
          $ref: '#/components/schemas/CheckpointReference'
        theoreticalDurationMs:
          $ref: '#/components/schemas/NullableNonNegativeInteger'
    RespawnRaceEvent:
      type: object
      additionalProperties: false
      required: [type, atUtc, durationMs, respawn]
      properties:
        type:
          type: string
          const: respawn
        atUtc:
          type: string
          format: date-time
        durationMs:
          type: integer
          minimum: 0
        respawn:
          $ref: '#/components/schemas/RespawnReference'
    CheckpointReference:
      type: object
      additionalProperties: false
      required: [index]
      properties:
        index:
          type: integer
          minimum: 0
    RespawnReference:
      type: object
      additionalProperties: false
      required: [checkpointIndex]
      properties:
        checkpointIndex:
          $ref: '#/components/schemas/NullableNonNegativeInteger'
    NullableNonNegativeInteger:
      type: [integer, 'null']
      minimum: 0
