openapi: 3.0.0
info:
  title: Chugmania Webhook Contract
  version: 1.1.0
  description: >-
    Contract for race attempt events emitted by the Chugmania Webhooks
    Openplanet plugin.
webhooks:
  raceAttemptEnded:
    post:
      summary: A race attempt ended
      description: >-
        Sent once when a captured solo or split-screen race attempt ends.
        Receivers should use eventId as an idempotency key because delivery may
        be retried.
      operationId: receiveRaceAttemptEnded
      security:
        - ApiKey: []
        - {}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RaceAttemptEndedEvent'
      responses:
        '204':
          description: Event accepted
        '400':
          description: Invalid event payload
        '401':
          description: Missing or invalid API key
        '500':
          description: Receiver failed to process the event
components:
  securitySchemes:
    ApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: Optional; sent only when an API key is configured in the plugin.
  schemas:
    RaceAttemptEndedEvent:
      type: object
      additionalProperties: false
      required:
        - schemaVersion
        - eventType
        - eventId
        - occurredAtUtc
        - source
        - attempt
      properties:
        schemaVersion:
          description: Version of the webhook payload schema used to encode this event.
          type: string
          const: '1.1'
        eventType:
          description: Stable identifier for the kind of event represented by the payload.
          type: string
          const: race.attempt.ended
        eventId:
          description: Unique attempt identifier that receivers can use as an idempotency key.
          type: string
          minLength: 1
        occurredAtUtc:
          description: UTC timestamp when the captured race attempt ended.
          type: string
          format: date-time
        source:
          description: Plugin and game that emitted the event.
          allOf:
            - $ref: '#/components/schemas/EventSource'
        attempt:
          description: Complete captured state and event history for the race attempt.
          allOf:
            - $ref: '#/components/schemas/RaceAttempt'
    EventSource:
      type: object
      additionalProperties: false
      required: [pluginName, pluginVersion, game]
      properties:
        pluginName:
          description: Name of the Openplanet plugin that emitted the event.
          type: string
          const: Chugmania Webhooks
        pluginVersion:
          description: Installed version of the Openplanet plugin that emitted the event.
          type: string
          minLength: 1
        game:
          description: Game from which the race attempt was captured.
          type: string
          const: Trackmania
    RaceAttempt:
      type: object
      additionalProperties: false
      required:
        - attemptId
        - format
        - playerCount
        - startedAtUtc
        - endedAtUtc
        - durationMs
        - endReason
        - timingSource
        - mode
        - map
        - players
      properties:
        attemptId:
          description: Unique identifier generated for this captured race attempt.
          type: string
          minLength: 1
        format:
          description: Whether the attempt involved one player or multiple local split-screen players.
          type: string
          enum: [solo, split_screen]
        playerCount:
          description: Number of players included in the attempt payload.
          type: integer
          minimum: 1
        startedAtUtc:
          description: UTC timestamp of the earliest captured player start in the attempt.
          type: string
          format: date-time
        endedAtUtc:
          description: UTC timestamp of the latest terminal player event in the attempt.
          type: string
          format: date-time
        durationMs:
          description: Elapsed milliseconds from the attempt start to its final player event.
          type: integer
          minimum: 0
        endReason:
          description: Condition that caused the plugin to close and emit the attempt.
          type: string
          enum: [all_finished, round_ended, restart, playground_closed, map_changed]
        timingSource:
          description: Clock source used for race durations and checkpoint times.
          type: string
          const: mlfeed_game_clock
        mode:
          description: Game mode state captured during the attempt.
          allOf:
            - $ref: '#/components/schemas/GameMode'
        map:
          description: Map metadata and race configuration for the attempt.
          allOf:
            - $ref: '#/components/schemas/Map'
        players:
          description: Players captured in the attempt, each with an ordered event history.
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/Player'
    GameMode:
      type: object
      additionalProperties: false
      required: [name, warmupActive, startTime, endTime, timeLimitMs, settings]
      properties:
        name:
          description: Server mode name, or null when the rules API does not expose one.
          type: [string, 'null']
        warmupActive:
          description: Whether the game mode was in its warmup phase when captured.
          type: boolean
        startTime:
          description: Mode start time on the game clock in milliseconds, or null when unavailable.
          allOf:
            - $ref: '#/components/schemas/NullableNonNegativeInteger'
        endTime:
          description: Mode end time on the game clock in milliseconds, or null when unavailable.
          allOf:
            - $ref: '#/components/schemas/NullableNonNegativeInteger'
        timeLimitMs:
          description: Difference between mode end and start times in milliseconds, or null when no positive limit is exposed.
          allOf:
            - $ref: '#/components/schemas/NullableNonNegativeInteger'
        settings:
          description: Generic behavior and scoring settings exposed by the mode rules.
          allOf:
            - $ref: '#/components/schemas/ModeSettings'
    ModeSettings:
      type: object
      additionalProperties: false
      required:
        - lapCountOverride
        - pointsLimit
        - spawnDelayDurationMs
        - respawnBehavior
        - checkpointBehavior
        - giveUpBehavior
        - giveUpRespawnAfter
        - giveUpSkipAfterFinish
        - usesTeams
      properties:
        lapCountOverride:
          description: Mode-level lap count override, or null when none is exposed.
          allOf:
            - $ref: '#/components/schemas/NullableNonNegativeInteger'
        pointsLimit:
          description: Points required by the mode's score limit, or null when unavailable.
          allOf:
            - $ref: '#/components/schemas/NullableNonNegativeInteger'
        spawnDelayDurationMs:
          description: Delay in milliseconds imposed by the mode before a player can spawn, or null when unavailable.
          allOf:
            - $ref: '#/components/schemas/NullableNonNegativeInteger'
        respawnBehavior:
          description: Mode rule that determines what happens when a player requests a respawn.
          type: string
          enum: [do_nothing, give_up_before_first_checkpoint, always_give_up, always_respawn, custom]
        checkpointBehavior:
          description: Mode rule that determines how checkpoint progression is handled.
          type: string
          enum: [default, infinite_laps, custom]
        giveUpBehavior:
          description: Mode rule that determines what happens when a player gives up.
          type: string
          enum: [do_nothing, give_up, custom]
        giveUpRespawnAfter:
          description: Whether the mode respawns a player after processing a give-up request.
          type: boolean
        giveUpSkipAfterFinish:
          description: Whether the mode ignores give-up requests after the player crosses the finish line.
          type: boolean
        usesTeams:
          description: Whether the mode enables clans, multiple clans, or forced clans.
          type: boolean
    Map:
      type: object
      additionalProperties: false
      required:
        - uid
        - name
        - authorLogin
        - authorName
        - mapType
        - mapStyle
        - laps
        - isLapRace
        - checkpointsPerLap
        - waypointsToFinish
        - mlFeedLapCount
        - medalTimesMs
      properties:
        uid:
          description: Stable unique identifier assigned to the Trackmania map.
          type: string
        name:
          description: Display name of the map with Trackmania formatting codes removed.
          type: string
        authorLogin:
          description: Trackmania login of the map author.
          type: string
        authorName:
          description: Display name of the map author with Trackmania formatting codes removed.
          type: string
        mapType:
          description: Map type reported by Trackmania, with formatting codes removed.
          type: string
        mapStyle:
          description: Map style reported by Trackmania, with formatting codes removed.
          type: string
        laps:
          description: Accurate lap count reported by MLFeed, or null when unavailable.
          allOf:
            - $ref: '#/components/schemas/NullableNonNegativeInteger'
        isLapRace:
          description: Whether the map objective is configured as a lap race.
          type: boolean
        checkpointsPerLap:
          description: Number of checkpoints in one lap reported by MLFeed, or null when unavailable.
          allOf:
            - $ref: '#/components/schemas/NullableNonNegativeInteger'
        waypointsToFinish:
          description: Total number of checkpoint or finish waypoints required to complete the race, or null when unavailable.
          allOf:
            - $ref: '#/components/schemas/NullableNonNegativeInteger'
        mlFeedLapCount:
          description: Accurate lap count supplied directly by MLFeed, or null when unavailable.
          allOf:
            - $ref: '#/components/schemas/NullableNonNegativeInteger'
        medalTimesMs:
          description: Map medal target times measured in milliseconds.
          allOf:
            - $ref: '#/components/schemas/MedalTimes'
    MedalTimes:
      type: object
      additionalProperties: false
      required: [author, gold, silver, bronze]
      properties:
        author:
          description: Author medal target time in milliseconds.
          type: integer
          minimum: 0
        gold:
          description: Gold medal target time in milliseconds.
          type: integer
          minimum: 0
        silver:
          description: Silver medal target time in milliseconds.
          type: integer
          minimum: 0
        bronze:
          description: Bronze medal target time in milliseconds.
          type: integer
          minimum: 0
    Player:
      type: object
      additionalProperties: false
      required:
        - participantKey
        - playerIndex
        - terminalIndex
        - login
        - accountId
        - name
        - finishPosition
        - events
      properties:
        participantKey:
          description: Best available stable player key, chosen from account ID, login, or a local fallback identifier.
          type: string
          minLength: 1
        playerIndex:
          description: Zero-based index of the player in the playground player list when capture began.
          type: integer
          minimum: 0
        terminalIndex:
          description: Zero-based split-screen terminal controlling the player, or -1 when no controlling terminal was found.
          type: integer
          minimum: -1
        login:
          description: Trackmania login associated with the player, or an empty string when unavailable.
          type: string
        accountId:
          description: Web services account identifier for the player, or null when unavailable.
          type: [string, 'null']
        name:
          description: Player display name with Trackmania formatting codes removed.
          type: string
        finishPosition:
          description: One-based finishing position among captured finishers, or null when the player did not finish.
          allOf:
            - $ref: '#/components/schemas/NullableNonNegativeInteger'
        events:
          description: Chronologically ordered race events captured for the player.
          type: array
          minItems: 2
          items:
            $ref: '#/components/schemas/RaceEvent'
    RaceEvent:
      description: A timestamped milestone or terminal action in a player's race.
      oneOf:
        - $ref: '#/components/schemas/BasicRaceEvent'
        - $ref: '#/components/schemas/CheckpointRaceEvent'
        - $ref: '#/components/schemas/RespawnRaceEvent'
      discriminator:
        propertyName: type
        mapping:
          start: '#/components/schemas/BasicRaceEvent'
          first_throttle: '#/components/schemas/BasicRaceEvent'
          quit: '#/components/schemas/BasicRaceEvent'
          restart: '#/components/schemas/BasicRaceEvent'
          dnf: '#/components/schemas/BasicRaceEvent'
          checkpoint: '#/components/schemas/CheckpointRaceEvent'
          finish: '#/components/schemas/CheckpointRaceEvent'
          respawn: '#/components/schemas/RespawnRaceEvent'
    BasicRaceEvent:
      type: object
      additionalProperties: false
      required: [type, atUtc, durationMs]
      properties:
        type:
          description: Kind of non-checkpoint event recorded for the player.
          type: string
          enum: [start, first_throttle, quit, restart, dnf]
        atUtc:
          description: UTC timestamp when the event occurred.
          type: string
          format: date-time
        durationMs:
          description: Player race time in milliseconds at which the event occurred.
          type: integer
          minimum: 0
    CheckpointRaceEvent:
      type: object
      additionalProperties: false
      required: [type, atUtc, durationMs, checkpoint, theoreticalDurationMs]
      properties:
        type:
          description: Whether the player reached an intermediate checkpoint or the finish.
          type: string
          enum: [checkpoint, finish]
        atUtc:
          description: UTC timestamp when the checkpoint or finish was reached.
          type: string
          format: date-time
        durationMs:
          description: Player race time in milliseconds when the checkpoint or finish was reached, including respawn losses.
          type: integer
          minimum: 0
        checkpoint:
          description: Checkpoint sequence position reached by this event.
          allOf:
            - $ref: '#/components/schemas/CheckpointReference'
        theoreticalDurationMs:
          description: Race time in milliseconds with cumulative respawn losses removed, or null when loss data is unavailable.
          allOf:
            - $ref: '#/components/schemas/NullableNonNegativeInteger'
    RespawnRaceEvent:
      type: object
      additionalProperties: false
      required: [type, atUtc, durationMs, respawn]
      properties:
        type:
          description: Identifies the event as a player respawn request.
          type: string
          const: respawn
        atUtc:
          description: UTC timestamp when the respawn occurred.
          type: string
          format: date-time
        durationMs:
          description: Player race time in milliseconds at which the respawn occurred.
          type: integer
          minimum: 0
        respawn:
          description: Checkpoint context associated with the respawn.
          allOf:
            - $ref: '#/components/schemas/RespawnReference'
    CheckpointReference:
      type: object
      additionalProperties: false
      required: [index]
      properties:
        index:
          description: One-based checkpoint sequence index reached by the player.
          type: integer
          minimum: 0
    RespawnReference:
      type: object
      additionalProperties: false
      required: [checkpointIndex]
      properties:
        checkpointIndex:
          description: Checkpoint sequence index from which the player respawned, or null when unavailable for an older respawn.
          allOf:
            - $ref: '#/components/schemas/NullableNonNegativeInteger'
    NullableNonNegativeInteger:
      description: A non-negative integer value, or null when the source does not provide it.
      type: [integer, 'null']
      minimum: 0
